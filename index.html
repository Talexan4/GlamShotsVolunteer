<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Sign-Up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body> 
    <header>
        <h1>Volunteer Sign-Up</h1>
        <p>Thank you for your interest in volunteering. Please fill out the form below to sign up. </p>
    </header>
    <main>
        <form id="volunteerForm">
            <label for="name">First Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="lastName">Last Name:</label>
            <input type="text" id="lastName" name="lastName" required>

            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" required>

            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" name="phone">

            <label>Availability:</label>
            <div class="checkbox-group">
                <label><input type="checkbox" name="availability" value="weekdays"> Weekdays</label>
                <label><input type="checkbox" name="availability" value="weekends"> Weekends</label>
                <label><input type="checkbox" name="availability" value="evenings"> Evenings</label>
            </div>

            <label for="role">Volunteer role:</label>
            <select id="role" name="role" required>
                <option value="">Select a role</option>
                <option value="photographer">Photographer</option>
                <option value="hair-stylist">Hair Stylist</option>
                <option value="makeup-artist">Makeup Artist</option>
                <option value="nail-technician">Nail Technician</option>
                <option value="general">General</option>
            </select>

            <button type="submit">Submit</button>
        </form>
    </main>
    <footer>
        <p>&copy; 2026 Volunteer Sign-Up. All rights reserved.</p>
    </footer>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
