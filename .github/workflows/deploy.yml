name: Deploy static site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Delete old artifacts
        run: |
          ARTIFACTS=$(gh api repos/${{ github.repository }}/actions/artifacts?per_page=100 --jq '.artifacts[] | select(.name=="github-pages") | .id' 2>/dev/null || echo "")
          if [ -n "$ARTIFACTS" ]; then
            echo "$ARTIFACTS" | while read id; do
              echo "Deleting artifact $id"
              gh api repos/${{ github.repository }}/actions/artifacts/$id -X DELETE 2>/dev/null || true
            done
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
